<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4eadb" />
    <title>Cookbook Menu Planner</title>
    <link rel="manifest" href="/cookbook-menu-planner/manifest.webmanifest?v=icons-20260708" />
    <link rel="icon" type="image/png" sizes="192x192" href="/cookbook-menu-planner/assets/cookbook-menu-planner-favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/cookbook-menu-planner/assets/cookbook-menu-planner-apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=20260714-3" />
    <script src="./supabase-config.js"></script>
    <script defer src="./app.js?v=20260714-3"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <img src="./assets/cookbook-worktop.png" alt="" />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="status-row">
            <button id="menuButton" class="menu-button" type="button" aria-controls="appMenu" aria-expanded="false">
              <span class="hamburger-lines" aria-hidden="true"></span>
              <span class="menu-button-label">メニュー</span>
            </button>
            <h1>きょうのこんだて</h1>
            <span id="storageBadge" class="hidden">Local</span>
          </div>
        </div>
      </header>

      <div id="menuOverlay" class="menu-overlay hidden"></div>
      <aside id="appMenu" class="app-menu hidden" aria-hidden="true">
        <div class="menu-header">
          <div>
            <span class="today-label">アカウント</span>
            <strong id="menuUserName">未ログイン</strong>
          </div>
          <button id="menuCloseButton" class="icon-button" type="button" title="閉じる">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div id="menuStatus" class="menu-status"></div>
        <div class="menu-actions">
          <button id="seedButton" class="secondary-button" type="button">DBサンプル投入</button>
          <button id="syncButton" class="secondary-button" type="button">再読込</button>
        </div>
        <form id="profileForm" class="menu-form hidden">
          <label>
            ユーザー名
            <input id="displayNameInput" type="text" autocomplete="username" maxlength="40" placeholder="ユーザー名" required />
          </label>
          <label>
            新しいパスワード
            <input id="newPasswordInput" type="password" autocomplete="new-password" placeholder="変更しない場合は空欄" />
          </label>
          <button class="secondary-button" type="submit">
            保存
          </button>
        </form>
        <button id="signOutButton" class="secondary-button hidden" type="button">
          ログアウト
        </button>
      </aside>

      <main class="workspace">
        <section id="authPanel" class="auth-panel">
          <div>
            <h2>ログイン</h2>
            <p>登録済みユーザーのみデータを同期します。</p>
            <span id="authBadge" class="auth-message">未ログイン</span>
          </div>
          <form id="authForm" class="auth-form">
            <input id="usernameInput" type="text" autocomplete="username" maxlength="40" placeholder="ユーザー名" required />
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="パスワード" required />
            <button class="primary-button" type="submit">
              <i data-lucide="key-round"></i>
              ログイン
            </button>
          </form>
        </section>

        <section id="todayPanel" class="panel today-panel app-view" data-view="today">
          <div class="panel-heading">
            <div>
              <h2>きょうのこんだて</h2>
              <span id="todayDateLabel" class="subtle"></span>
            </div>
          </div>
          <div class="today-grid">
            <div class="today-meal">
              <span class="today-label">作るもの</span>
              <strong id="todayMealTitle">未定</strong>
              <span id="todayMealMeta" class="subtle"></span>
            </div>
            <div>
              <span class="today-label">材料</span>
              <div id="todayIngredients" class="quick-list"></div>
            </div>
            <div>
              <span class="today-label">作り方</span>
              <div id="todaySteps" class="quick-list"></div>
            </div>
          </div>
        </section>

        <section class="dashboard-grid">
          <div class="panel recipe-panel app-view" data-view="recipe">
            <div class="panel-heading">
              <div>
                <h2>レシピDB</h2>
                <span id="recipeCount" class="subtle"></span>
              </div>
              <button id="clearFormButton" class="secondary-button" type="button">クリア</button>
            </div>

            <form id="recipeForm" class="recipe-form">
              <input id="recipeId" type="hidden" />
              <label>
                料理名
                <input id="titleInput" type="text" placeholder="鮭の南蛮漬け" required />
              </label>
              <div class="form-row">
                <label>
                  出典
                  <input id="sourceInput" type="text" placeholder="和食の基本 p.42" />
                </label>
                <label>
                  人数
                  <input id="servingsInput" type="number" min="1" max="12" value="2" />
                </label>
              </div>
              <label>
                タグ
                <input id="tagsInput" type="text" placeholder="和食, 魚, 作り置き" />
              </label>
              <label>
                材料
                <textarea id="ingredientsInput" rows="6" placeholder="鮭 2切れ&#10;玉ねぎ 1/2個&#10;酢 大さじ3"></textarea>
              </label>
              <label>
                行程
                <textarea id="stepsInput" rows="5" placeholder="1. 鮭に塩をふる&#10;2. 野菜を切る&#10;3. 調味料に漬ける"></textarea>
              </label>
              <div class="form-actions">
                <button class="primary-button" type="submit">
                  保存
                </button>
                <button id="deleteRecipeButton" class="danger-button hidden" type="button">
                  <i data-lucide="trash-2"></i>
                  削除
                </button>
              </div>
            </form>
          </div>

          <div class="panel import-panel app-view" data-view="recipe">
            <div class="panel-heading">
              <div>
                <h2>電子書籍テキスト</h2>
                <span class="subtle">材料 / 作り方 見出しに対応</span>
              </div>
              <button id="parseButton" class="secondary-button" type="button">テキストから抽出</button>
            </div>
            <div class="file-import-row">
              <input id="pdfInput" type="file" accept="application/pdf,.pdf" />
              <button id="pdfImportButton" class="secondary-button" type="button">
                PDF読込
              </button>
            </div>
            <textarea id="ebookInput" rows="12" placeholder="料理名&#10;材料（2人分）&#10;鶏もも肉 300g&#10;長ねぎ 1本&#10;&#10;作り方&#10;1. 材料を切る&#10;2. フライパンで焼く"></textarea>
            <div id="parseResult" class="parse-result"></div>
          </div>

          <div class="panel plan-panel app-view" data-view="plan">
            <div class="panel-heading plan-heading">
              <div>
                <h2>月間献立</h2>
                <span id="monthLabel" class="subtle"></span>
              </div>
              <div class="compact-actions">
                <button id="prevMonthButton" class="icon-button" type="button" title="前月">
                  <i data-lucide="chevron-left"></i>
                </button>
                <button id="nextMonthButton" class="icon-button" type="button" title="翌月">
                  <i data-lucide="chevron-right"></i>
                </button>
              </div>
            </div>
            <div class="plan-tools">
              <button id="suggestMonthButton" class="primary-button" type="button">
                今月を提案
              </button>
              <select id="recipeSelect" aria-label="献立に入れるレシピ"></select>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </div>

          <div class="panel list-panel app-view" data-view="shopping">
            <div class="panel-heading shopping-heading">
              <div>
                <h2>買い物リスト</h2>
                <span id="weekLabel" class="subtle"></span>
              </div>
              <div class="compact-actions">
                <button id="prevWeekButton" class="icon-button" type="button" title="前週">
                  <i data-lucide="chevron-left"></i>
                </button>
                <button id="nextWeekButton" class="icon-button" type="button" title="翌週">
                  <i data-lucide="chevron-right"></i>
                </button>
              </div>
            </div>
            <div id="shoppingList" class="shopping-list"></div>
          </div>
        </section>

        <section class="panel recipe-list-panel app-view" data-view="recipe">
          <div class="panel-heading">
            <div>
              <h2>登録済みレシピ</h2>
              <span class="subtle">献立候補</span>
            </div>
            <input id="searchInput" class="search-input" type="search" placeholder="検索" />
          </div>
          <div id="recipeList" class="recipe-list"></div>
        </section>
      </main>
      <nav id="mobileNav" class="mobile-nav" aria-label="主要メニュー">
        <button class="mobile-nav-button active" type="button" data-tab="today">
          今日
        </button>
        <button class="mobile-nav-button" type="button" data-tab="shopping">
          買い物
        </button>
        <button class="mobile-nav-button" type="button" data-tab="plan">
          献立
        </button>
        <button class="mobile-nav-button" type="button" data-tab="recipe">
          レシピ
        </button>
      </nav>
    </div>
  </body>
</html>
